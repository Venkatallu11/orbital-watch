name: orbital-watch scheduled run

# Runs the maneuver/conjunction/observation-health watch on a schedule,
# since GitHub Actions runners are ephemeral: state.json (last-seen TLEs +
# baseline history + maneuver events) is committed back to the repo after
# each run so the next run picks up where this one left off.
#
# Before this workflow can do anything useful:
#   1. Copy watchlist.example.json to watchlist.json, edit it with the
#      NORAD IDs you care about, and commit it -- it's gitignored by
#      default so local users don't clutter the repo with a personal
#      watchlist, but the scheduled workflow needs a real one committed
#      to have anything to watch. (One is already committed here as a
#      starting point -- edit it to taste.)
#   2. (Optional) Add repo secrets SPACETRACK_USER / SPACETRACK_PASS and
#      change `--source celestrak` to `--source spacetrack` below for the
#      richer/faster-updated catalog.
#   3. (Optional) Add repo secret ALERT_WEBHOOK_URL for Discord/Slack alerts.
#   4. (Optional) Add repo secret FIRMS_MAP_KEY for real, GLOBAL wildfire
#      detection counts (NASA FIRMS) on the website's Wildfire & Volcano
#      Watch panel -- sign up free (2 minutes, no cost) at
#      https://firms.modaps.eosdis.nasa.gov/api/map_key/ . Without this,
#      that panel still shows real US-only volcano status (USGS, no key
#      needed) but honestly says the fire-detection count isn't set up yet.
#   5. One-time manual step this workflow cannot do for you: in the repo's
#      Settings -> Pages, set "Source" to "GitHub Actions". Until that's
#      done, the deploy-pages step below will fail even though everything
#      else succeeds -- it just means Pages isn't turned on yet.
#
# NOTE: run #1 on this workflow (2026-07-04) failed on
# `test_satcat_fetch_failure_falls_back_to_unfiltered_watchlist` -- fixed,
# see that test's docstring. Run #2 got past tests (61 passed) but then hit
# `ModuleNotFoundError: No module named 'orbital_watch'`, because
# `pip install -r requirements.txt` only installs dependencies, not the
# package itself -- tests only worked because each test file manually adds
# src/ to sys.path. Fixed below by installing the package via pyproject.toml
# instead, which also gives us the `orbital-watch` console script directly.
#
# ALSO NOTE: GitHub only fires `schedule` triggers for a workflow file as it
# exists on the repository's DEFAULT branch. If this lands on a
# non-default branch first, the schedule won't fire until it's on the
# default branch -- use the "Run workflow" button (workflow_dispatch, below)
# to test it manually in the meantime.

on:
  schedule:
    - cron: "0 * * * *"  # hourly
  workflow_dispatch: {}  # allows manual triggering from the Actions tab

permissions:
  contents: write  # needed to commit state.json back
  pages: write     # needed to deploy the docs/ website to GitHub Pages
  id-token: write  # needed by actions/deploy-pages for OIDC verification

jobs:
  watch:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed -- site_history_cli walks every past commit of state.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orbital-watch (package + dependencies + dev extras)
        run: pip install -e ".[dev]"

      - name: Run offline test suite (sanity check before touching live data)
        run: pytest tests/ -q

      - name: Check watchlist.json exists
        run: |
          if [ ! -f watchlist.json ]; then
            echo "::error::watchlist.json not found. Copy watchlist.example.json to watchlist.json, edit it, and commit it -- see this workflow's header comment."
            exit 1
          fi

      - name: Run orbital-watch
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
        run: |
          orbital-watch \
            --watchlist watchlist.json \
            --state state.json \
            --source celestrak \
            --include-socrates --include-satnogs --include-crew \
            --include-deep-space --include-volcano-status \
            --digest-out digest.md

      - name: Commit updated state and digest
        run: |
          git config user.name "orbital-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json digest.md
          git diff --cached --quiet || git commit -m "orbital-watch: update state and digest [skip ci]"
          git push

      - name: Generate website data (docs/data.json)
        run: |
          orbital-watch-site-data \
            --watchlist watchlist.json \
            --state state.json \
            --object-names names.json \
            --categories-file categories.json \
            --instruments-file instruments.json \
            --achievements-file achievements.json \
            --out docs/data.json

      - name: Generate website history (docs/history.json)
        run: |
          orbital-watch-site-history \
            --watchlist watchlist.json \
            --repo . \
            --out docs/history.json

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
